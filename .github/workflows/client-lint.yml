name: Client Lint & Format

on:
  pull_request:
    paths:
      - "client/**"
  push:
    branches: [main, master]
    paths:
      - "client/**"

jobs:
  lint-format:
    name: ESLint + Prettier
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: npm ci
        run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings 10

      - name: Prettier check
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Run tests
        run: npm test
